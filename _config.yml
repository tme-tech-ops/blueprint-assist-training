title: Blueprint Assist Training
description: Training materials and documentation for Blueprint Assist (BPA), an AI-powered infrastructure deployment tool.
url: "https://tme-tech-ops.github.io"
baseurl: "/blueprint-assist-training"

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-optional-front-matter
  - jekyll-readme-index

optional_front_matter:
  remove_originals: true

readme_index:
  enabled: true
  remove_originals: false

relative_links:
  enabled: true
  collections: true

include:
  - "*.md"

exclude:
  - "4.examples/"
  - "2.presentations/"
  - "3.resources/"
  - "docs/docs-internal/"
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules/"
  - "vendor/"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

defaults:
  - scope:
      path: ""
    values:
      layout: default
